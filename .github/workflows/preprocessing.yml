name: Automated Data Preprocessing Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # checkout repository kode
    - name: Checkout Code
      uses: actions/checkout@v3

    # setup environment Python 
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    # install depedensi
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # script copy data raw
    - name: Generate Raw Data Simulation
      run: |
        python -c "
        import os, pandas as pd, numpy as np
        os.makedirs('namadataset_raw', exist_ok=True)
        np.random.seed(42)
        data = {
            'customer_id': range(1001, 1101),
            'age': np.random.randint(20, 65, size=100),
            'income': np.random.randint(3000000, 30000000, size=100),
            'loan_amount': np.random.randint(5000000, 50000000, size=100),
            'credit_score': np.random.randint(300, 850, size=100),
            'employment_type': np.random.choice(['Full-Time', 'Part-Time'], size=100),
            'risk_rating': np.random.choice([0, 1], size=100)
        }
        df = pd.DataFrame(data)
        df.to_csv('namadataset_raw/credit_data.csv', index=False)
        "

    # automation
    - name: Run Data Preprocessing Automation
      run: python automate_ahmad-rifaat.py

    # verified error
    - name: Verify Processed Artifact
      run: |
        if [ -f "namadataset_preprocessing/credit_data_processed.csv" ]; then
          echo "Artifact Preprocessing Berhasil Terbentuk!"
          head -n 5 namadataset_preprocessing/credit_data_processed.csv
        else
          echo "Error: Artifact tidak ditemukan!"
          exit 1
        fi
